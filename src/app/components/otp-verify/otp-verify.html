<div class="auth-page">
  <div class="auth-card">
    <a class="auth-brand" routerLink="/Master">Roselle</a>
    <div class="email-icon">
      <i class="bi bi-envelope-check-fill"></i>
    </div>
    <h1 class="auth-title">Verify Your Email</h1>
    <p class="auth-sub">
      We've sent a 6-digit code to<br>
      <strong>{{ email || 'your email address' }}</strong>
    </p>

    <div class="auth-error" *ngIf="errorMessage">
      <i class="bi bi-exclamation-circle"></i> {{ errorMessage }}
    </div>

    <div class="otp-inputs" (paste)="onPaste($event)">
      <input
        *ngFor="let d of digits; let i = index"
        [id]="'otp-' + i"
        type="text"
        inputmode="numeric"
        maxlength="1"
        class="otp-box"
        [value]="digits[i]"
        (input)="onInput($event, i)"
        (keydown)="onKeydown($event, i)"
        [class.filled]="digits[i]"
      />
    </div>

    <button class="btn-submit" (click)="verify()" [disabled]="otpValue.length < 6">
      <span *ngIf="!isLoading">Verify & Continue</span>
      <span *ngIf="isLoading" class="spinner"></span>
    </button>

    <div class="resend-row">
      <span *ngIf="!canResend">Resend code in {{ resendCountdown }}s</span>
      <button *ngIf="canResend" class="resend-btn" (click)="resend()">
        <i class="bi bi-arrow-clockwise"></i> Resend Code
      </button>
    </div>

    <p class="auth-switch">
      <a routerLink="/login"><i class="bi bi-arrow-left me-1"></i>Back to Sign In</a>
    </p>
  </div>
</div>
